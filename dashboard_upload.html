<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더블하트 쿠팡 매출 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f3f4f7;--card:#fff;--border:#e2e5eb;--border2:#c8cdd8;
  --text:#1a1d27;--text2:#5a6072;--text3:#9ba3b8;
  --accent:#2563eb;--col-sep:#c0c7d6;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;}

/* ── UPLOAD SCREEN ── */
#uploadScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  z-index:100;transition:opacity .3s;
}
#uploadScreen.hidden{opacity:0;pointer-events:none;}
.upload-box{
  width:480px;border:2px dashed var(--border2);border-radius:16px;
  padding:48px 32px;text-align:center;background:var(--card);
  cursor:pointer;transition:border-color .2s,background .2s;
}
.upload-box:hover,.upload-box.drag{border-color:var(--accent);background:rgba(37,99,235,.03);}
.upload-icon{font-size:48px;margin-bottom:16px;}
.upload-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
.upload-sub{font-size:13px;color:var(--text3);line-height:1.6;}
.upload-btn{
  display:inline-block;margin-top:20px;padding:10px 28px;
  background:var(--accent);color:#fff;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);
  transition:background .15s;
}
.upload-btn:hover{background:#1d4ed8;}
.upload-note{font-size:11px;color:var(--text3);margin-top:12px;}
#fileInput{display:none;}
.upload-error{color:#dc2626;font-size:12px;margin-top:10px;min-height:18px;}

/* ── SHELL ── */
.shell{
  display:grid;grid-template-rows:46px 38px auto 1fr;
  width:100vw;height:100vh;padding:10px 12px;gap:7px;
}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:0 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.hdr-logo{font-size:14px;font-weight:700;}
.hdr-logo span{color:var(--accent);}
.hdr-sep{width:1px;height:18px;background:var(--border2);margin:0 14px;}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-badge{font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--bg);padding:3px 10px;border-radius:5px;border:1px solid var(--border);}
.reload-btn{
  font-size:11px;color:var(--text3);background:var(--bg);padding:3px 10px;
  border-radius:5px;border:1px solid var(--border);cursor:pointer;font-family:var(--font);
  transition:all .15s;
}
.reload-btn:hover{color:var(--accent);border-color:rgba(37,99,235,.4);}

/* ── TABS ── */
.tabs-row{
  display:flex;align-items:center;gap:5px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:0 12px;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.tabs-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-right:6px;white-space:nowrap;}
.tab{
  font-size:11px;font-weight:500;padding:5px 16px;border-radius:6px;cursor:pointer;
  border:1px solid transparent;color:var(--text2);background:transparent;font-family:var(--font);transition:all .15s;
}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--border2);font-weight:600;}

/* ── MONTHLY SUMMARY ── */
.mo-row{display:flex;gap:7px;}
.mo-card{
  flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:11px 15px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.mo-tag{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.mo-dot{width:8px;height:8px;border-radius:50%;}
.mo-month-label{font-size:11px;font-weight:600;letter-spacing:.03em;}
.mo-sales{font-size:21px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:9px;}
.mo-meta{display:flex;gap:18px;}
.mo-item{display:flex;flex-direction:column;gap:2px;}
.mo-k{font-size:11px;color:var(--text3);letter-spacing:.02em;}
.mo-v{font-size:13px;font-family:var(--mono);color:var(--text2);}
.mo-pill{display:inline-block;font-size:13px;font-weight:700;font-family:var(--mono);padding:2px 9px;border-radius:5px;}
.mo-accent{position:absolute;bottom:0;left:0;right:0;height:3px;}

/* ── CONTENT ── */
.content{display:grid;grid-template-columns:1fr 1fr;gap:7px;min-height:0;overflow:hidden;}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;flex-shrink:0;}
.tbl-wrap{flex:1;overflow:auto;}

/* ── CTG TABLE ── */
#ctgTbl{width:100%;border-collapse:collapse;font-size:11px;}
#ctgTbl thead th{
  position:sticky;top:0;z-index:2;background:#f8f9fb;
  font-size:9px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;
  padding:5px 8px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap;
}
#ctgTbl thead th.tl{text-align:left;}
#ctgTbl thead th.grp-hdr{text-align:center;border-left:2px solid var(--col-sep);padding:4px 8px;}
#ctgTbl thead tr:nth-child(2) th{background:#f0f2f7;font-size:9px;border-top:1px solid var(--border);}
#ctgTbl thead tr:nth-child(2) th.sub-first{border-left:2px solid var(--col-sep);}
#ctgTbl tbody td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2);text-align:right;white-space:nowrap;}
#ctgTbl tbody td.tl{text-align:left;color:var(--text);}
#ctgTbl tbody tr:hover td{background:#f8f9fb;}
#ctgTbl tbody td.month-sep{border-left:2px solid var(--col-sep);}
#ctgTbl tr.total td{border-top:1px solid var(--border2);border-bottom:none;font-weight:700;color:var(--text);background:#f0f2f7;}
#ctgTbl tr.total td.month-sep{border-left:2px solid var(--col-sep);}
.num{font-family:var(--mono);}
.rate-cell{font-family:var(--mono);color:var(--accent);font-weight:500;}
.rate-neg{font-family:var(--mono);color:#e85d2f;font-weight:500;}

/* ── TOP10 TABLE ── */
#topTbl{width:100%;border-collapse:collapse;font-size:11px;}
#topTbl thead{position:sticky;top:0;z-index:2;}
#topTbl thead tr.col-hdr th{
  background:#f8f9fb;font-size:9px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;
  border-bottom:1px solid var(--border2);text-align:right;white-space:nowrap;
}
#topTbl thead tr.col-hdr th.tl{text-align:left;}
#topTbl tbody td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2);text-align:right;}
#topTbl tbody td.pnum{color:var(--text3);font-family:var(--mono);width:20px;text-align:left;}
#topTbl tbody td.pname{text-align:left;color:var(--text);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#topTbl tbody tr:hover td{background:#f8f9fb;}

.pill{display:inline-block;font-size:12px;padding:2px 8px;border-radius:4px;font-weight:600;font-family:var(--mono);}
.ph{background:rgba(22,163,74,.1);color:#15803d;}
.pm{background:rgba(37,99,235,.1);color:#1d4ed8;}
.pl{background:rgba(180,83,9,.1);color:#b45309;}
.pn{background:rgba(220,38,38,.1);color:#dc2626;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- ══ 업로드 화면 ══ -->
<div id="uploadScreen">
  <div class="upload-box" id="dropZone">
    <div class="upload-icon">📊</div>
    <div class="upload-title">엑셀 파일을 올려주세요</div>
    <div class="upload-sub">
      매달 업데이트된 엑셀 파일을 드래그하거나<br>
      아래 버튼으로 선택하면 대시보드가 자동으로 갱신됩니다.<br><br>
      <strong>필요한 시트:</strong> raw data<br>
      <strong>필요한 컬럼:</strong> 구분월 · Ctg. · 결제액 · 최종마진(vat+) · 구매수(수량) · 노출상품명(옵션명)
    </div>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📂 파일 선택</button>
    <div class="upload-note">지원 형식: .xlsx · .xls</div>
    <div class="upload-error" id="uploadError"></div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<!-- ══ 대시보드 ══ -->
<div class="shell" id="dashboard" style="display:none;">

  <div class="hdr">
    <div style="display:flex;align-items:center;">
      <div class="hdr-logo">더블하트 <span>쿠팡</span> 매출 대시보드</div>
      <div class="hdr-sep"></div>
      <div class="hdr-sub">마켓플레이스 정산내역</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-badge" id="hdrPeriod">—</div>
      <button class="reload-btn" onclick="resetUpload()">🔄 파일 교체</button>
    </div>
  </div>

  <div class="tabs-row">
    <div class="tabs-label">조회 기간 :</div>
    <div id="tabsContainer" style="display:flex;gap:5px;"></div>
  </div>

  <div class="mo-row" id="moRow"></div>

  <div class="content">
    <div class="card">
      <div class="card-title" id="ctgTitle">카테고리별 매출 · 마진 현황</div>
      <div class="tbl-wrap"><table id="ctgTbl"></table></div>
    </div>
    <div class="card">
      <div class="card-title" id="topTitle">매출 Top 10 상품</div>
      <div class="tbl-wrap"><table id="topTbl"></table></div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════
   월 순서용 팔레트 (12개월)
══════════════════════════════════ */
const PALETTE = [
  '#2563eb','#7c3aed','#db2777','#e85d2f',
  '#d97706','#16a34a','#0891b2','#4f46e5',
  '#be123c','#b45309','#15803d','#0369a1'
];
const MONTH_ORDER = ['01월','02월','03월','04월','05월','06월','07월','08월','09월','10월','11월','12월'];

const CTG_ORDER = ['젖꼭지','젖병+젖꼭지','젖병','쪽쪽이/치발기','이유실감','수유용품','위생용품','세탁용품','스킨케어','컵/이유식기','덴탈케어','유리젖병 3종','선케어','세정용품'];

/* ══════════════════════════════════
   전역 데이터 저장소
══════════════════════════════════ */
let MONTHS = [];       // 존재하는 월 목록 (정렬)
let COLORS = {};       // 월 → 색상
let MBGS   = {};       // 월 → 연한 배경색
let MONTHLY = {};      // 월 → {sales, margin, rate, qty}
let CTG     = {};      // 카테고리 → {월 → [sales, margin]}
let TOP10   = {};      // 월 → [[name, sales, margin, rate], ...]
let curTab  = 'all';

/* ══════════════════════════════════
   유틸
══════════════════════════════════ */
function comma(n){ return Math.round(n).toLocaleString('ko-KR'); }
function toManW(n){
  const man = Math.round(n/10000);
  const abs = Math.abs(man);
  const sign = man < 0 ? '-' : '';
  if(abs >= 10000){ const e=Math.floor(abs/10000),r=abs%10000; return r>0?`${sign}${e}억 ${r.toLocaleString('ko-KR')}만원`:`${sign}${e}억원`; }
  return sign + abs.toLocaleString('ko-KR') + '만원';
}
function fmtSales(n){
  const man=Math.round(n/10000);
  if(man>=10000){ const e=Math.floor(man/10000),r=man%10000; return r>0?`${e}억 ${r.toLocaleString('ko-KR')}만원`:`${e}억원`; }
  return man.toLocaleString('ko-KR')+'만원';
}
function fmtMan(n){ return Math.round(n/10000).toLocaleString('ko-KR')+'만원'; }
function fmtR(r){ return (Math.round(r*1000)/10).toFixed(1)+'%'; }
function pc(r){ return r>=.20?'ph':r>=.10?'pm':r>=0?'pl':'pn'; }

/* ══════════════════════════════════
   엑셀 파싱
══════════════════════════════════ */
function parseExcel(file){
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});

      // 'raw data' 시트 찾기
      const sheetName = wb.SheetNames.find(s => s.toLowerCase().replace(/\s/g,'') === 'rawdata');
      if(!sheetName) throw new Error("'raw data' 시트를 찾을 수 없습니다.");

      const ws = wb.Sheets[sheetName];
      // header:1 → 2번째 행을 헤더로
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      // 헤더 행 찾기 (구분월 포함된 행)
      let hdrIdx = rows.findIndex(r => r.some(c => String(c).includes('구분월')));
      if(hdrIdx < 0) throw new Error("'구분월' 컬럼을 찾을 수 없습니다.");

      const headers = rows[hdrIdx].map(c => String(c).trim());

      // 필요한 컬럼 인덱스
      const ci = {
        month:   headers.findIndex(h => h === '구분월'),
        ctg:     headers.findIndex(h => h === 'Ctg.'),
        sales:   headers.findIndex(h => h === '결제액'),
        margin:  headers.findIndex(h => h.replace(/\n/g,'').replace(/\s/g,'') === '최종마진(vat+)'),
        qty:     headers.findIndex(h => h.replace(/\n/g,'').replace(/\s/g,'') === '구매수(수량)'),
        name:    headers.findIndex(h => h.replace(/\n/g,'').replace(/\s/g,'') === '노출상품명(옵션명)'),
      };

      const missing = Object.entries(ci).filter(([k,v])=>v<0).map(([k])=>k);
      if(missing.length) throw new Error(`컬럼을 찾을 수 없음: ${missing.join(', ')}`);

      // 데이터 수집
      const rawRows = rows.slice(hdrIdx+1).filter(r => r[ci.ctg] && String(r[ci.ctg]).trim());

      // 초기화
      const monthSet = new Set();
      const ctgMap   = {};   // ctg → month → [sales, margin]
      const monthMap = {};   // month → {sales, margin, qty}
      const prodMap  = {};   // month → { name → {sales, margin} }

      rawRows.forEach(r => {
        const month  = String(r[ci.month]||'').trim();
        const ctg    = String(r[ci.ctg]||'').trim();
        const sales  = parseFloat(r[ci.sales])||0;
        const margin = parseFloat(r[ci.margin])||0;
        const qty    = parseFloat(r[ci.qty])||0;
        const name   = String(r[ci.name]||'').trim();

        if(!month || !ctg) return;
        monthSet.add(month);

        // 월별 집계
        if(!monthMap[month]) monthMap[month]={sales:0,margin:0,qty:0};
        monthMap[month].sales  += sales;
        monthMap[month].margin += margin;
        monthMap[month].qty    += qty;

        // 카테고리별
        if(!ctgMap[ctg]) ctgMap[ctg]={};
        if(!ctgMap[ctg][month]) ctgMap[ctg][month]=[0,0];
        ctgMap[ctg][month][0] += sales;
        ctgMap[ctg][month][1] += margin;

        // 상품별
        if(!prodMap[month]) prodMap[month]={};
        if(!prodMap[month][name]) prodMap[month][name]={sales:0,margin:0};
        prodMap[month][name].sales  += sales;
        prodMap[month][name].margin += margin;
      });

      // 월 정렬
      MONTHS = MONTH_ORDER.filter(m => monthSet.has(m));
      if(!MONTHS.length) throw new Error("유효한 데이터가 없습니다.");

      // 색상 배정
      COLORS={}; MBGS={};
      MONTHS.forEach((m,i)=>{
        const c = PALETTE[i % PALETTE.length];
        COLORS[m] = c;
        MBGS[m]   = c + '14';
      });

      // 전역 저장
      MONTHLY={};
      MONTHS.forEach(m=>{
        const d = monthMap[m]||{sales:0,margin:0,qty:0};
        MONTHLY[m] = {...d, rate: d.sales>0 ? d.margin/d.sales : 0};
      });

      CTG={};
      Object.entries(ctgMap).forEach(([ctg,mv])=>{ CTG[ctg]=mv; });

      TOP10={};
      MONTHS.forEach(m=>{
        const prods = Object.entries(prodMap[m]||{})
          .map(([name,v])=>([name, v.sales, v.margin, v.sales>0?v.margin/v.sales:0]))
          .sort((a,b)=>b[1]-a[1]).slice(0,10);
        TOP10[m] = prods;
      });

      // 대시보드 렌더
      renderDashboard();
      document.getElementById('uploadError').textContent='';

    } catch(err) {
      document.getElementById('uploadError').textContent = '⚠️ ' + err.message;
    }
  };
  reader.readAsBinaryString(file);
}

/* ══════════════════════════════════
   대시보드 렌더
══════════════════════════════════ */
function renderDashboard(){
  // 헤더 기간 표시
  document.getElementById('hdrPeriod').textContent =
    `2026 · ${MONTHS[0]} — ${MONTHS[MONTHS.length-1]}`;

  // 탭 생성
  const tc = document.getElementById('tabsContainer');
  tc.innerHTML = '';
  const makeTab = (m, label) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (m==='all'?' active':'');
    btn.dataset.m = m;
    btn.textContent = label;
    btn.onclick = () => go(m, btn);
    tc.appendChild(btn);
  };
  makeTab('all','전체 비교');
  MONTHS.forEach(m => makeTab(m, m.replace('월','월')));

  curTab = 'all';
  buildMo('all');
  buildCtg('all');
  buildTop('all');

  document.getElementById('uploadScreen').classList.add('hidden');
  document.getElementById('dashboard').style.display='grid';
}

/* ── 월별 요약 ── */
function buildMo(m){
  let show3;
  if(m==='all'){ show3=MONTHS.slice(-3); }
  else { const i=MONTHS.indexOf(m); show3=MONTHS.slice(Math.max(0,i-2),i+1); }

  document.getElementById('moRow').innerHTML = show3.map(mo=>{
    const d=MONTHLY[mo]; if(!d) return '';
    const c=COLORS[mo];
    const rCls = d.rate>=.14?'ph':d.rate>=.10?'pm':'pn';
    return `<div class="mo-card">
      <div class="mo-tag"><div class="mo-dot" style="background:${c}"></div>
        <span class="mo-month-label" style="color:${c}">● ${mo}</span></div>
      <div class="mo-sales">${fmtSales(d.sales)}</div>
      <div class="mo-meta">
        <div class="mo-item"><div class="mo-k">마진</div><div class="mo-v">${fmtMan(d.margin)}</div></div>
        <div class="mo-item"><div class="mo-k">마진율</div><span class="mo-pill ${rCls}">${fmtR(d.rate)}</span></div>
        <div class="mo-item"><div class="mo-k">수량</div><div class="mo-v">${comma(d.qty)}건</div></div>
      </div>
      <div class="mo-accent" style="background:${c};"></div>
    </div>`;
  }).join('');
}

/* ── CTG 표 ── */
function buildCtg(m){
  const tbl = document.getElementById('ctgTbl');

  // 표시할 월 목록
  const viewMs = (m==='all') ? MONTHS : [m];

  // 카테고리 목록: CTG_ORDER 기준 + 데이터에 있는 나머지
  const allCtgs = [...CTG_ORDER.filter(c=>CTG[c]), ...Object.keys(CTG).filter(c=>!CTG_ORDER.includes(c))];

  if(m==='all'){
    document.getElementById('ctgTitle').textContent = `카테고리별 월별 매출 · 마진 현황 (단위: 만원)`;
    let h=`<thead><tr>
      <th class="tl" rowspan="2" style="vertical-align:middle;min-width:88px;background:#f0f2f7;">구분</th>
      ${viewMs.map(mo=>`<th colspan="3" class="grp-hdr" style="color:${COLORS[mo]};background:${MBGS[mo]}">2026년 ${mo}</th>`).join('')}
    </tr><tr>
      ${viewMs.map(()=>`<th class="sub-first" style="text-align:right;">결제액</th><th style="text-align:right;">마진액</th><th style="text-align:right;">마진율</th>`).join('')}
    </tr></thead><tbody>`;

    const tot={}; viewMs.forEach(mo=>{tot[mo]=[0,0];});
    allCtgs.forEach(ctg=>{
      const d=CTG[ctg]||{};
      if(!viewMs.some(mo=>d[mo]&&d[mo][0]>0)) return;
      h+=`<tr><td class="tl">${ctg}</td>`;
      viewMs.forEach(mo=>{
        const[s,mg]=d[mo]||[0,0]; tot[mo][0]+=s; tot[mo][1]+=mg;
        if(!s){ h+=`<td class="num month-sep" style="color:#c8cdd8">—</td><td class="num" style="color:#c8cdd8">—</td><td style="color:#c8cdd8">—</td>`; return; }
        const r=mg/s;
        h+=`<td class="num month-sep">${toManW(s)}</td><td class="num">${toManW(mg)}</td><td class="${mg<0?'rate-neg':'rate-cell'}">${fmtR(r)}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`<tr class="total"><td class="tl">합계</td>`;
    viewMs.forEach(mo=>{
      const[ts,tm]=tot[mo]; const tr=ts?tm/ts:0;
      h+=`<td class="num month-sep">${toManW(ts)}</td><td class="num">${toManW(tm)}</td><td class="${tm<0?'rate-neg':'rate-cell'}">${fmtR(tr)}</td>`;
    });
    h+=`</tr></tbody>`;
    tbl.innerHTML=h;

  } else {
    document.getElementById('ctgTitle').textContent=`2026년 ${m} 카테고리별 매출 · 마진 (단위: 만원)`;
    let h=`<thead><tr>
      <th class="tl" style="min-width:100px;background:#f8f9fb;">구분</th>
      <th style="background:#f8f9fb;">결제액</th>
      <th style="background:#f8f9fb;">마진액</th>
      <th style="background:#f8f9fb;">마진율</th>
    </tr></thead><tbody>`;
    let ts=0,tm=0;
    allCtgs.forEach(ctg=>{
      const[s,mg]=(CTG[ctg]||{})[m]||[0,0]; if(!s) return;
      ts+=s; tm+=mg; const r=mg/s;
      h+=`<tr><td class="tl">${ctg}</td><td class="num">${toManW(s)}</td><td class="num">${toManW(mg)}</td><td class="${mg<0?'rate-neg':'rate-cell'}">${fmtR(r)}</td></tr>`;
    });
    const tr=ts?tm/ts:0;
    h+=`<tr class="total"><td class="tl">합계</td><td class="num">${toManW(ts)}</td><td class="num">${toManW(tm)}</td><td class="${tm<0?'rate-neg':'rate-cell'}">${fmtR(tr)}</td></tr></tbody>`;
    tbl.innerHTML=h;
  }
}

/* ── Top10 표 ── */
function buildTop(m){
  const tbl = document.getElementById('topTbl');
  const targetM = (m==='all') ? MONTHS[MONTHS.length-1] : m;
  document.getElementById('topTitle').textContent=`2026년 ${targetM} 매출 Top 10 상품`;
  const rows = TOP10[targetM]||[];
  let h=`<thead><tr class="col-hdr">
    <th class="tl" style="width:22px;">#</th>
    <th class="tl">노출상품명(옵션명)</th>
    <th>매출액</th><th>마진액</th><th>마진율</th>
  </tr></thead><tbody>`;
  rows.forEach(([name,s,mg,r],i)=>{
    h+=`<tr>
      <td class="pnum">${i+1}</td>
      <td class="pname" title="${name}">${name}</td>
      <td class="num">${toManW(s)}</td>
      <td class="num">${toManW(mg)}</td>
      <td><span class="pill ${pc(r)}">${fmtR(r)}</span></td>
    </tr>`;
  });
  h+=`</tbody>`;
  tbl.innerHTML=h;
}

/* ── 탭 전환 ── */
function go(m, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  // 탭 색상 동적 적용
  if(m!=='all' && COLORS[m]){
    btn.style.color=COLORS[m];
    btn.style.borderColor=COLORS[m]+'66';
    btn.style.background=COLORS[m]+'0d';
  }
  curTab=m;
  buildMo(m); buildCtg(m); buildTop(m);
}

/* ── 파일 교체 ── */
function resetUpload(){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('uploadScreen').classList.remove('hidden');
  document.getElementById('fileInput').value='';
  document.getElementById('uploadError').textContent='';
}

/* ══════════════════════════════════
   파일 업로드 이벤트
══════════════════════════════════ */
document.getElementById('fileInput').addEventListener('change', e=>{
  if(e.target.files[0]) parseExcel(e.target.files[0]);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('drag');});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && (f.name.endsWith('.xlsx')||f.name.endsWith('.xls'))) parseExcel(f);
  else document.getElementById('uploadError').textContent='⚠️ .xlsx 또는 .xls 파일만 지원합니다.';
});
</script>
